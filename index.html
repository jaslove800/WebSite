<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Name Is J</title>
<style>
  @font-face {
    font-family: 'Anton';
    src: local('Anton');
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    background: #050505;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Narrow', Arial, sans-serif;
    text-align: center;
    padding: 24px;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
    z-index: 1;
  }

  .stage {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 640px;
  }

  .logo-wrap {
    width: min(88vw, 560px);
    margin-bottom: 8px;
    animation: settle 1.1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  .logo-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }

  @keyframes settle {
    0% { opacity: 0; transform: translateY(14px) scale(0.98); filter: blur(2px); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  .tagline {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-weight: 700;
    font-style: italic;
    font-size: clamp(20px, 5vw, 34px);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: #f4f4f0;
    position: relative;
    margin-top: 4px;
    animation: fadeUp 0.8s ease-out 0.5s both;
  }

  .tagline .glitch {
    position: relative;
    display: inline-block;
    color: #F2871F;
  }

  .tagline .glitch::before,
  .tagline .glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    width: 100%;
    opacity: 0;
  }

  .tagline .glitch::before {
    color: #4C8C3C;
    animation: glitchShift 5.5s ease-in-out infinite;
  }

  .tagline .glitch::after {
    color: #2f8fb0;
    animation: glitchShift 5.5s ease-in-out infinite 0.08s reverse;
  }

  @keyframes glitchShift {
    0%, 88%, 100% { opacity: 0; transform: translate(0, 0); }
    89% { opacity: 0.7; transform: translate(-2px, 1px); }
    91% { opacity: 0.7; transform: translate(2px, -1px); }
    93% { opacity: 0; transform: translate(0, 0); }
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .divider {
    width: 46px;
    height: 2px;
    background: #F2871F;
    margin: 22px 0;
    animation: widen 0.6s ease-out 0.9s both;
  }

  @keyframes widen {
    0% { width: 0; opacity: 0; }
    100% { width: 46px; opacity: 1; }
  }

  .sub {
    font-family: Arial, sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: #8a8a86;
    letter-spacing: 0.01em;
    line-height: 1.6;
    max-width: 420px;
    animation: fadeUp 0.8s ease-out 1.05s both;
  }

  .sub strong {
    color: #b8b8b3;
    font-weight: 700;
  }

  .socials {
    display: flex;
    gap: 20px;
    margin-top: 34px;
    animation: fadeUp 0.8s ease-out 1.25s both;
  }

  .socials a {
    color: #6f6f6b;
    text-decoration: none;
    font-family: Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding-bottom: 3px;
    border-bottom: 1px solid transparent;
    transition: color 0.2s ease, border-color 0.2s ease;
  }

  .socials a:hover {
    color: #F2871F;
    border-color: #F2871F;
  }

  footer {
    position: relative;
    z-index: 2;
    margin-top: 48px;
    font-family: Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: #4a4a47;
    text-transform: uppercase;
  }

  @media (prefers-reduced-motion: reduce) {
    .logo-wrap, .tagline, .divider, .sub, .socials {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
    .tagline .glitch::before,
    .tagline .glitch::after {
      animation: none !important;
      opacity: 0 !important;
    }
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="logo-wrap">
      <img src="logo.png" alt="My Name Is J">
    </div>

    <p class="tagline">
      the journey is <span class="glitch" data-text="coming">coming</span>
    </p>

    <div class="divider"></div>

    <p class="sub">
      An adventure worth remembering.<br>
      <strong>Wishlist coming soon.</strong>
    </p>

    <div class="socials">
      <a href="https://x.com/MyNameIsJGame" target="_blank" rel="noopener">X</a>
      <a href="https://instagram.com/MyNameIsJGame" target="_blank" rel="noopener">Instagram</a>
      <a href="https://tiktok.com/@MyNameIsJGame" target="_blank" rel="noopener">TikTok</a>
    </div>
  </div>

  <footer>&copy; 2026 My Name Is J</footer>

</body>
</html>
